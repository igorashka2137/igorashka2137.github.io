            color: #00ff00;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 3px dashed #ff0055;
            width: 100%;
            background: #0a0a0a;
        }

        h1 {
            margin: 0;
            font-size: 3.5rem;
            color: #ff0055;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #00ffff, -3px -3px 0px #ffff00;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .subtitle {
            color: #00ffff;
            font-size: 1.5rem;
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
        }

        .container {
            max-width: 1200px;
            width: 90%;
            margin: 40px 0;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .shitpost-card {
            background-color: #0a0a0a;
            border: 3px solid #00ff00;
            border-radius: 0px; /* Klasyczny, kanciasty styl */
            overflow: hidden;
            box-shadow: 10px 10px 0px #ff0055;
            transition: all 0.2s ease;
        }

        .shitpost-card:hover {
            transform: translate(-5px, -5px);
            box-shadow: 15px 15px 0px #00ffff;
            border-color: #ffff00;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-bottom: 3px solid #ff0055;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 20px;
            background: #111;
            font-family: 'Courier New', Courier, monospace;
        }

        .video-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffff00;
            text-transform: uppercase;
        }

        .warning-text {
            color: #ff0000;
            animation: fast-blink 0.5s infinite;
            font-weight: bold;
        }

        @keyframes fast-blink {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .back-btn {
            margin: 30px 0;
            padding: 15px 30px;
            background-color: #ff0055;
            color: white;
            border: 3px solid #ffffff;
            font-size: 1.2rem;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 5px 5px 0px #00ff00;
            transition: 0.1s;
        }

        .back-btn:hover {
            box-shadow: 2px 2px 0px #00ff00;
            transform: translate(3px, 3px);
            background-color: #00ff00;
            color: black;
            border-color: black;
        }

        footer {
            padding: 30px;
            font-family: monospace;
            color: #444;
        }
    </style>
</head>
