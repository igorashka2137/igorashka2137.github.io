<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>igorashka - Moje Filmy</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #ff0000;
            margin-bottom: 30px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .video-card {
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Proporcje 16:9 */
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .video-info {
            padding: 15px;
            text-align: left;
        }
        .video-title {
            font-size: 16px;
            font-weight: bold;
            margin: 0;
        }
    </style>
</head>
<body>

    <h1>igorashka - Archiwum Filmów</h1>

    <div class="video-grid">
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/ZAPISZ_ID_FILMU_1" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <p class="video-title">Minecraft Speedrun (world record)</p>
            </div>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/ZAPISZ_ID_FILMU_2" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <p class="video-title">very haigh kuality cs 2 vido</p>
            </div>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/ZAPISZ_ID_FILMU_3" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <p class="video-title">The isaac pro gameplay</p>
            </div>
        </div>
    </div>

</body>
</html>
